<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CapitalPath</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
}

/* HERO VIDEO */
.hero{
position:relative;
height:100vh;
overflow:hidden;
}

.bg-video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

.overlay{
position:relative;
background:rgba(0,0,0,0.6);
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:#fff;
padding:20px;
}

.logo{
width:120px;
margin-bottom:20px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

p{
font-size:18px;
margin-bottom:20px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#16a34a;
color:#fff;
cursor:pointer;
}

/* PREVIEW */
.preview{
background:#0f172a;
padding:40px 20px;
text-align:center;
color:#fff;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
max-width:900px;
margin:auto;
}

.grid img{
width:100%;
border-radius:10px;
}
</style>
</head>
