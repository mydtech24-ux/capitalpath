<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CapitalPath</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.container{
max-width:600px;
padding:20px;
}

.logo{
width:120px;
margin-bottom:20px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

p{
font-size:18px;
opacity:.9;
margin-bottom:30px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#16a34a;
color:#fff;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:.85;
}
</style>
</head>

<body>

<div class="container">

<img src="https://raw.githubusercontent.com/mydtech24-ux/capitalpath/main/logo.jpg" class="logo">

<h1>Build Your Digital Product</h1>

<p>Access powerful tools, guides, and resources to launch your online business.</p>

<button onclick="goShop()">Shop</button>

</div>

<script>
function goShop(){
window.location.href="shop.html";
}
</script>

</body>
</html>
